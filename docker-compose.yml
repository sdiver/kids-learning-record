version: '3.8'

services:
  kids-learning:
    build: .
    ports:
      - "3000:3000"
    environment:
      # 指定数据库存储路径（挂载 volume 的位置）
      - DB_PATH=/app/data/kids_learning.db
      # 可选：设置时区
      - TZ=Asia/Shanghai
    volumes:
      # 数据持久化 - 将容器内的 /app/data 映射到宿主机的 ./data 目录
      - ./data:/app/data
      # 可选：挂载自定义文章（如果需要外部编辑）
      # - ./custom-articles:/app/public/custom-articles
    restart: unless-stopped
